services:
  app:
    image: ${ECR_URL}:${IMAGE_TAG:-latest}
    ports:
      - "80:80"
    environment:
      - FLASK_ENV=production
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:80"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 10s